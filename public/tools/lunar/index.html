<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #000;
  color: #fff;
  font-family: 'Malgun Gothic', 'Noto Sans KR', sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
}

/* ── 헤더 ── */
.header {
  padding: 14px 20px 10px;
  font-size: 20px; font-weight: 700;
  border-bottom: 1px solid #1a1a1a;
  flex-shrink: 0;
}

/* ── 오늘 정보 바 (3줄 동일 폰트) ── */
.today-bar {
  padding: 12px 20px;
  border-bottom: 1px solid #1a1a1a;
  flex-shrink: 0;
  display: flex; flex-direction: column; gap: 6px;
}
.today-line {
  font-size: 16px; font-weight: 700;
  color: #fff; line-height: 1.35;
}
.today-line.lunar  { color: #a78bfa; }
.today-line.ganjok { color: #555; font-weight: 600; }

/* ── 모드 탭 ── */
.mode-tabs {
  display: flex; gap: 6px;
  padding: 12px 16px;
  border-bottom: 1px solid #1a1a1a;
  flex-shrink: 0;
}
.mode-tab {
  flex: 1;
  background: #1a1a1a; border: none;
  color: #555; font-weight: 400;
  font-family: inherit;
  padding: 10px 0; border-radius: 10px;
  cursor: pointer; transition: background 0.15s, color 0.15s;
  display: flex; align-items: center; justify-content: center;
  line-height: 1;
}
.mode-tab .tab-icon {
  display: flex; align-items: center; gap: 6px;
}
.mode-tab .ic-sm { font-size: 18px; opacity: 0.75; }
.mode-tab .ic-lg { font-size: 26px; }
.mode-tab.active { background: #7c6af7; color: #fff; }
.mode-tab:hover:not(.active) { color: #999; }

/* ── 입력 영역 ── */
.input-area {
  padding: 16px 20px 14px;
  border-bottom: 1px solid #1a1a1a;
  flex-shrink: 0;
}
.field-label {
  font-size: 12px; color: #555;
  margin-bottom: 10px; letter-spacing: 1px;
}

/* 공통 날짜 입력 (양력/음력 동일 스타일) */
.date-inputs {
  display: flex; gap: 6px; align-items: center; flex-wrap: nowrap;
}
.date-inputs input[type="number"] {
  background: #1a1a1a; border: 1px solid #2a2a2a;
  color: #fff; font-size: 16px; font-family: inherit;
  padding: 9px 10px; border-radius: 12px;
  outline: none; -moz-appearance: textfield;
  min-width: 0;
}
.date-inputs input[type="number"]::-webkit-outer-spin-button,
.date-inputs input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
.date-inputs input[type="number"]:focus { border-color: #7c6af7; }
.date-inputs input.inp-year { width: 88px; }
.date-inputs input.inp-day  { width: 62px; }

.date-inputs select {
  background: #1a1a1a; border: 1px solid #2a2a2a;
  color: #ccc; font-size: 16px; font-family: inherit;
  padding: 9px 10px; border-radius: 12px;
  outline: none; cursor: pointer;
  appearance: none; -webkit-appearance: none;
  width: 72px;
}
.date-inputs select:focus { border-color: #7c6af7; }
.date-inputs select option { background: #1a1a1a; }

.inp-sep { font-size: 18px; color: #333; flex-shrink: 0; }

/* 윤달 체크박스 (음력→양력 전용) */
.leap-row {
  display: flex; align-items: center; gap: 6px;
  margin-top: 10px;
}
.leap-check {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; color: #666; cursor: pointer;
}
.leap-check input { accent-color: #7c6af7; width: 15px; height: 15px; cursor: pointer; }
.field-note { font-size: 11px; color: #3a3a3a; margin-left: 4px; }

/* 변환 버튼 */
.convert-btn {
  width: 100%; margin-top: 12px;
  background: #7c6af7; border: none;
  color: #fff; font-size: 15px; font-weight: 700;
  font-family: inherit;
  padding: 12px 0; border-radius: 12px;
  cursor: pointer; transition: opacity 0.15s;
}
.convert-btn:hover  { opacity: 0.85; }
.convert-btn:active { opacity: 0.7; }

/* ── 결과 영역 ── */
.result-area {
  flex: 1; overflow-y: auto; padding: 20px;
}
.result-area::-webkit-scrollbar { width: 4px; }
.result-area::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

.result-card {
  background: #111; border: 1px solid #1e1e1e;
  border-radius: 14px; padding: 20px;
  display: flex; flex-direction: column; gap: 8px;
}
.result-line {
  font-size: 16px; font-weight: 700; color: #fff; line-height: 1.35;
}
.result-line.accent { color: #a78bfa; }
.result-line.dim    { font-size: 14px; font-weight: 600; color: #555; }

.result-empty {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100%; gap: 12px; color: #2a2a2a;
}
.result-empty-icon { font-size: 56px; }
.result-empty p    { font-size: 13px; }
.result-error { color: #f87171; font-size: 14px; }

@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- 헤더 -->
<div class="header">음력 / 양력 변환기</div>

<!-- 오늘 정보 (3줄 동일 폰트) -->
<div class="today-bar">
  <div class="today-line"        id="todaySolar">-</div>
  <div class="today-line lunar"  id="todayLunar">-</div>
  <div class="today-line ganjok" id="todayGanjok">-</div>
</div>

<!-- 모드 탭 -->
<div class="mode-tabs">
  <button class="mode-tab active" data-mode="s2l" onclick="switchMode('s2l')" title="양력 → 음력">
    <span class="tab-icon">
      <span class="ic-sm">☀</span>
      <span class="ic-lg">☽</span>
    </span>
  </button>
  <button class="mode-tab" data-mode="l2s" onclick="switchMode('l2s')" title="음력 → 양력">
    <span class="tab-icon">
      <span class="ic-sm">☽</span>
      <span class="ic-lg">☀</span>
    </span>
  </button>
</div>

<!-- 양력 → 음력 입력 -->
<div class="input-area" id="s2lInput">
  <div class="field-label">양력 날짜</div>
  <div class="date-inputs">
    <input type="number" class="inp-year" id="solarYear"  placeholder="연도" min="1900" max="2100"
           onkeydown="if(event.key==='Enter') convertSolarToLunar()">
    <span class="inp-sep">년</span>
    <select id="solarMonth">
      <option value="1">1월</option><option value="2">2월</option>
      <option value="3">3월</option><option value="4">4월</option>
      <option value="5">5월</option><option value="6">6월</option>
      <option value="7">7월</option><option value="8">8월</option>
      <option value="9">9월</option><option value="10">10월</option>
      <option value="11">11월</option><option value="12">12월</option>
    </select>
    <span class="inp-sep">월</span>
    <input type="number" class="inp-day" id="solarDay" placeholder="일" min="1" max="31"
           onkeydown="if(event.key==='Enter') convertSolarToLunar()">
    <span class="inp-sep">일</span>
  </div>
  <button class="convert-btn" onclick="convertSolarToLunar()">음력으로 변환</button>
</div>

<!-- 음력 → 양력 입력 -->
<div class="input-area" id="l2sInput" style="display:none">
  <div class="field-label">음력 날짜</div>
  <div class="date-inputs">
    <input type="number" class="inp-year" id="lunarYear"  placeholder="연도" min="1900" max="2100"
           onkeydown="if(event.key==='Enter') convertLunarToSolar()">
    <span class="inp-sep">년</span>
    <select id="lunarMonth">
      <option value="1">1월</option><option value="2">2월</option>
      <option value="3">3월</option><option value="4">4월</option>
      <option value="5">5월</option><option value="6">6월</option>
      <option value="7">7월</option><option value="8">8월</option>
      <option value="9">9월</option><option value="10">10월</option>
      <option value="11">11월</option><option value="12">12월</option>
    </select>
    <span class="inp-sep">월</span>
    <input type="number" class="inp-day" id="lunarDay" placeholder="일" min="1" max="30"
           onkeydown="if(event.key==='Enter') convertLunarToSolar()">
    <span class="inp-sep">일</span>
  </div>
  <div class="leap-row">
    <label class="leap-check">
      <input type="checkbox" id="isLeap"> 윤달
    </label>
    <span class="field-note">※ 해당 월에 윤달이 없으면 평달로 처리</span>
  </div>
  <button class="convert-btn" onclick="convertLunarToSolar()">양력으로 변환</button>
</div>

<!-- 결과 -->
<div class="result-area" id="resultArea">
  <div class="result-empty">
    <div class="result-empty-icon">🌙</div>
    <p>날짜를 입력하고 변환하세요</p>
  </div>
</div>

<script type="module">
import KoreanLunarCalendar from '../../lib/korean-lunar-calendar.esm.js';

const p2 = n => String(n).padStart(2, '0');

// ── 간지 계산 ──
const STEMS    = ['갑','을','병','정','무','기','경','신','임','계'];
const BRANCHES = ['자','축','인','묘','진','사','오','미','신','유','술','해'];
const ANIMALS  = ['쥐','소','호랑이','토끼','용','뱀','말','양','원숭이','닭','개','돼지'];
const DOW_KO   = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];

function getGanjok(year) {
  const s = STEMS[(year - 4 + 400) % 10];
  const b = BRANCHES[(year - 4 + 1200) % 12];
  const a = ANIMALS[(year - 4 + 1200) % 12];
  return `${s}${b}년 (${a}의 해)`;
}

function getDow(y, m, d) {
  return DOW_KO[new Date(y, m - 1, d).getDay()];
}

// ── KoreanLunarCalendar 직접 사용 (서버 불필요) ──
const lunarCal = new KoreanLunarCalendar();

function calcSolarToLunar(year, month, day) {
  const ok = lunarCal.setSolarDate(year, month, day);
  if (!ok) throw new Error('지원하지 않는 날짜입니다');
  return lunarCal.getLunarCalendar();
}

function calcLunarToSolar(year, month, day, isLeap) {
  const ok = lunarCal.setLunarDate(year, month, day, isLeap);
  if (!ok) throw new Error('지원하지 않는 날짜입니다');
  return lunarCal.getSolarCalendar();
}

// ── 모드 전환 ──
function switchMode(mode) {
  document.querySelectorAll('.mode-tab').forEach(b =>
    b.classList.toggle('active', b.dataset.mode === mode));
  document.getElementById('s2lInput').style.display = mode === 's2l' ? 'block' : 'none';
  document.getElementById('l2sInput').style.display = mode === 'l2s' ? 'block' : 'none';
  showEmptyResult();
}

// ── 변환: 양력 → 음력 ──
function convertSolarToLunar() {
  const y = parseInt(document.getElementById('solarYear').value);
  const m = parseInt(document.getElementById('solarMonth').value);
  const d = parseInt(document.getElementById('solarDay').value);
  if (!y || !m || !d || y < 1900 || y > 2100 || d < 1 || d > 31) {
    showError('연, 월, 일을 올바르게 입력해주세요');
    return;
  }
  try {
    const lunar = calcSolarToLunar(y, m, d);
    const dow   = getDow(y, m, d);
    showResult(
      `(양력): ${y}년 ${p2(m)}월 ${p2(d)}일 (${dow})`,
      `(음력): ${lunar.year}년 ${lunar.intercalation ? '윤' : ''}${p2(lunar.month)}월 ${p2(lunar.day)}일 (${dow})`,
      getGanjok(lunar.year)
    );
  } catch(e) {
    showError('변환 오류: ' + (e.message || '지원하지 않는 날짜입니다'));
  }
}

// ── 변환: 음력 → 양력 ──
function convertLunarToSolar() {
  const y    = parseInt(document.getElementById('lunarYear').value);
  const m    = parseInt(document.getElementById('lunarMonth').value);
  const d    = parseInt(document.getElementById('lunarDay').value);
  const leap = document.getElementById('isLeap').checked;
  if (!y || !m || !d || y < 1900 || y > 2100 || d < 1 || d > 30) {
    showError('연, 월, 일을 올바르게 입력해주세요');
    return;
  }
  try {
    const solar = calcLunarToSolar(y, m, d, leap);
    const dow   = getDow(solar.year, solar.month, solar.day);
    showResult(
      `(음력): ${y}년 ${leap ? '윤' : ''}${p2(m)}월 ${p2(d)}일 (${dow})`,
      `(양력): ${solar.year}년 ${p2(solar.month)}월 ${p2(solar.day)}일 (${dow})`,
      getGanjok(y)
    );
  } catch(e) {
    showError('변환 오류: ' + (e.message || '지원하지 않는 날짜입니다'));
  }
}

// ── 결과 표시 ──
function showResult(line1, line2, line3) {
  document.getElementById('resultArea').innerHTML = `
    <div class="result-card">
      <div class="result-line">${line1}</div>
      <div class="result-line accent">${line2}</div>
      <div class="result-line dim">${line3}</div>
    </div>`;
}
function showError(msg) {
  document.getElementById('resultArea').innerHTML =
    `<div class="result-card"><div class="result-error">⚠️ ${msg}</div></div>`;
}
function showEmptyResult() {
  document.getElementById('resultArea').innerHTML = `
    <div class="result-empty">
      <div class="result-empty-icon">🌙</div>
      <p>날짜를 입력하고 변환하세요</p>
    </div>`;
}

// ── 오늘 정보 ──
function loadTodayInfo() {
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth() + 1, d = now.getDate();
  const dow = getDow(y, m, d);

  document.getElementById('todaySolar').textContent =
    `(양력): ${y}년 ${p2(m)}월 ${p2(d)}일 (${dow})`;

  // 양력 입력 기본값 설정
  document.getElementById('solarYear').value  = y;
  document.getElementById('solarMonth').value = m;
  document.getElementById('solarDay').value   = d;

  try {
    const lunar = calcSolarToLunar(y, m, d);
    document.getElementById('todayLunar').textContent =
      `(음력): ${lunar.year}년 ${lunar.intercalation ? '윤' : ''}${p2(lunar.month)}월 ${p2(lunar.day)}일 (${dow})`;
    document.getElementById('todayGanjok').textContent = getGanjok(lunar.year);

    // 음력 입력 기본값 설정
    document.getElementById('lunarYear').value  = lunar.year;
    document.getElementById('lunarMonth').value = lunar.month;
    document.getElementById('lunarDay').value   = lunar.day;
  } catch(e) {
    document.getElementById('todayLunar').textContent  = '(음력): 오류';
    document.getElementById('todayGanjok').textContent = '';
  }
}

// ── HTML onclick 속성에서 호출 가능하도록 window에 노출 ──
window.switchMode = switchMode;
window.convertSolarToLunar = convertSolarToLunar;
window.convertLunarToSolar = convertLunarToSolar;

loadTodayInfo();
</script>
</body>
</html>
