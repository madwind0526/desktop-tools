<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #000; color: #fff;
  font-family: 'Malgun Gothic', 'Noto Sans KR', sans-serif;
  height: 100vh; display: flex; flex-direction: column;
  overflow: hidden; user-select: none;
}

/* ── 탭 바 ── */
.tab-bar { display: flex; border-bottom: 1px solid #1a1a1a; flex-shrink: 0; }
.tab-btn {
  flex: 1; background: none; border: none;
  color: #555; font-size: 14px; font-weight: 700; font-family: inherit;
  padding: 13px 0; cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
}
.tab-btn.active { color: #fff; border-bottom-color: #7c6af7; }
.tab-btn:hover:not(.active) { color: #888; }

/* ── 섹션 ── */
.section { flex: 1; display: flex; flex-direction: column; min-height: 0; }
.section.hidden { display: none; }

/* ═══════════════════════
   타이머 섹션
═══════════════════════ */

/* 디스플레이 */
.timer-top {
  display: flex; flex-direction: column;
  align-items: center; padding: 18px 20px 10px;
  flex-shrink: 0;
}

.timer-display {
  display: flex; align-items: center; gap: 4px;
  margin-bottom: 6px;
}
.seg {
  font-size: 58px; font-weight: 100;
  font-variant-numeric: tabular-nums;
  padding: 4px 10px; border-radius: 12px;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  color: #fff;
}
.seg.active {
  background: rgba(124,106,247,0.25);
  color: #a78bfa;
}
.seg:hover:not(.active) { background: #1a1a1a; }
.tsep { font-size: 48px; font-weight: 100; color: #333; }

.seg-labels {
  display: flex; gap: 4px; width: 100%;
  justify-content: center; padding: 0 0 2px;
}
.seg-lbl {
  font-size: 11px; color: #444; letter-spacing: 1px;
  width: 80px; text-align: center;
}

/* 프리셋 */
.presets {
  display: flex; gap: 8px;
  padding: 8px 16px;
  flex-shrink: 0;
}
.preset-btn {
  flex: 1; background: #1a1a1a; border: none;
  color: #888; font-size: 13px; font-weight: 700; font-family: inherit;
  padding: 8px 0; border-radius: 10px; cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
.preset-btn:hover { background: #252525; color: #ccc; }
.preset-btn:active { background: #2d2d2d; }

/* 컨트롤 버튼 */
.timer-controls {
  display: flex; gap: 8px; padding: 6px 16px 8px; flex-shrink: 0;
}
.ctrl-btn {
  flex: 1; height: 50px; border: none; border-radius: 14px;
  font-size: 15px; font-weight: 700; font-family: inherit;
  cursor: pointer; transition: opacity 0.1s;
}
.ctrl-btn:active  { opacity: 0.7; }
.ctrl-btn:disabled { opacity: 0.2; cursor: default; }
.ctrl-start  { background: #7c6af7; color: #fff; flex: 2; }
.ctrl-reset  { background: #1a1a1a; color: #ccc; }

/* 키패드 */
.timer-keypad { padding: 0 10px 12px; flex-shrink: 0; }
.timer-key-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
}
.tkey {
  height: 62px; width: 100%; border: none; border-radius: 14px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-family: inherit; font-size: 20px; font-weight: 300;
  transition: opacity 0.1s;
}
.tkey:active  { opacity: 0.55; }
.tkey:disabled { opacity: 0.18; cursor: default; }
.tk-num  { background: #2d2d2d; color: #fff; }
.tk-func { background: #1a1a1a; color: #ccc; font-size: 16px; }
.tk-back { background: #1a1a1a; color: #fff; font-size: 15px; }

/* 완료 플래시 */
.seg.done-flash { animation: doneFlash 0.5s ease infinite alternate; color: #4ade80; }
@keyframes doneFlash { from { opacity: 1; } to { opacity: 0.25; } }

/* ═══════════════════════
   알람 섹션
═══════════════════════ */
.alarm-clock-wrap {
  display: flex; flex-direction: column; align-items: center;
  padding: 16px 20px 12px; border-bottom: 1px solid #1a1a1a; flex-shrink: 0;
}
.clock-display {
  font-size: 46px; font-weight: 100; letter-spacing: 2px;
  font-variant-numeric: tabular-nums;
}
.clock-date { font-size: 12px; color: #444; margin-top: 4px; }

.alarm-add-form {
  display: flex; gap: 8px; padding: 10px 16px;
  border-bottom: 1px solid #1a1a1a; flex-shrink: 0; align-items: center;
}
.alarm-time-input {
  background: #1a1a1a; border: 1px solid #2a2a2a;
  color: #fff; font-size: 16px; font-family: inherit;
  padding: 8px 10px; border-radius: 10px; outline: none; cursor: pointer;
  color-scheme: dark; flex-shrink: 0;
}
.alarm-time-input:focus { border-color: #7c6af7; }
.alarm-label-input {
  flex: 1; background: #1a1a1a; border: 1px solid #2a2a2a;
  color: #fff; font-size: 14px; font-family: inherit;
  padding: 8px 12px; border-radius: 10px; outline: none;
}
.alarm-label-input:focus { border-color: #7c6af7; }
.alarm-label-input::placeholder { color: #444; }
.add-btn {
  background: #7c6af7; border: none; color: #fff; font-size: 22px;
  width: 40px; height: 40px; border-radius: 10px; cursor: pointer;
  flex-shrink: 0; transition: opacity 0.15s; line-height: 1;
}
.add-btn:hover { opacity: 0.85; }

.alarm-list { flex: 1; overflow-y: auto; padding: 4px 16px; }
.alarm-list::-webkit-scrollbar { width: 4px; }
.alarm-list::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

.alarm-item {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 0; border-bottom: 1px solid #111;
}
.alarm-item:last-child { border-bottom: none; }
.alarm-time { font-size: 30px; font-weight: 200; min-width: 92px; color: #555; }
.alarm-item.on .alarm-time { color: #fff; }
.alarm-item.firing .alarm-time { color: #f87171; animation: alarmPulse 0.55s ease infinite alternate; }
@keyframes alarmPulse { from { color: #f87171; } to { color: #fff; } }
.alarm-info { flex: 1; }
.alarm-lbl  { font-size: 14px; color: #888; }

.alarm-del-btn {
  background: none; border: none; color: #333; font-size: 20px;
  cursor: pointer; padding: 4px 8px; border-radius: 6px;
  transition: color 0.15s; flex-shrink: 0;
}
.alarm-del-btn:hover { color: #f87171; }

/* 토글 */
.toggle { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: #333; border-radius: 12px; transition: 0.25s; cursor: pointer;
}
.toggle-slider:before {
  content: ''; position: absolute;
  height: 18px; width: 18px; left: 3px; bottom: 3px;
  background: #666; border-radius: 50%; transition: 0.25s;
}
.toggle input:checked + .toggle-slider { background: #7c6af7; }
.toggle input:checked + .toggle-slider:before { transform: translateX(20px); background: #fff; }

.alarm-empty {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100%; gap: 12px; color: #2a2a2a; padding: 40px 0;
}
.alarm-empty-icon { font-size: 48px; opacity: 0.5; }
.alarm-empty p    { font-size: 13px; }

/* 지난 알람 → 회색 */
.alarm-item.past .alarm-time { color: #383838 !important; }
.alarm-item.past .alarm-lbl  { color: #2e2e2e !important; }

/* C (리셋) 버튼 */
.reset-btn {
  background: #1a1a1a; border: none; color: #888; font-size: 14px; font-weight: 700;
  width: 40px; height: 40px; border-radius: 10px; cursor: pointer;
  flex-shrink: 0; transition: background 0.15s, color 0.15s; font-family: inherit;
}
.reset-btn:hover { background: #2a2a2a; color: #ccc; }
</style>
</head>
<body>

<!-- 탭 -->
<div class="tab-bar">
  <button class="tab-btn active" data-tab="timer" onclick="switchTab('timer')">⏱ 타이머</button>
  <button class="tab-btn"        data-tab="alarm" onclick="switchTab('alarm')">🔔 알람</button>
</div>

<!-- ─── 타이머 ─── -->
<div class="section" id="timerSection">

  <!-- 디스플레이 (H:M:S 각각 클릭 가능) -->
  <div class="timer-top">
    <div class="timer-display">
      <span class="seg active" id="segH" onclick="selectSeg('h')" title="시간 클릭">00</span>
      <span class="tsep">:</span>
      <span class="seg" id="segM" onclick="selectSeg('m')" title="분 클릭">00</span>
      <span class="tsep">:</span>
      <span class="seg" id="segS" onclick="selectSeg('s')" title="초 클릭">00</span>
    </div>
    <div class="seg-labels">
      <span class="seg-lbl">시간</span>
      <span class="seg-lbl" style="width:12px"></span>
      <span class="seg-lbl">분</span>
      <span class="seg-lbl" style="width:12px"></span>
      <span class="seg-lbl">초</span>
    </div>
  </div>

  <!-- 프리셋 -->
  <div class="presets">
    <button class="preset-btn" onclick="setPreset(0,5,0)">5분</button>
    <button class="preset-btn" onclick="setPreset(0,10,0)">10분</button>
    <button class="preset-btn" onclick="setPreset(0,30,0)">30분</button>
    <button class="preset-btn" onclick="setPreset(1,0,0)">1시간</button>
    <button class="preset-btn" onclick="setPreset(3,0,0)">3시간</button>
  </div>

  <!-- 컨트롤 -->
  <div class="timer-controls">
    <button class="ctrl-btn ctrl-reset" id="resetBtn" onclick="resetTimer()">↺ 재설정</button>
    <button class="ctrl-btn ctrl-start" id="startBtn" onclick="toggleTimer()" disabled>▶ 시작</button>
  </div>

  <!-- 키패드 -->
  <div class="timer-keypad" id="numpadWrap">
    <div class="timer-key-grid">
      <button class="tkey tk-num"  onclick="pressDigit(7)">7</button>
      <button class="tkey tk-num"  onclick="pressDigit(8)">8</button>
      <button class="tkey tk-num"  onclick="pressDigit(9)">9</button>

      <button class="tkey tk-num"  onclick="pressDigit(4)">4</button>
      <button class="tkey tk-num"  onclick="pressDigit(5)">5</button>
      <button class="tkey tk-num"  onclick="pressDigit(6)">6</button>

      <button class="tkey tk-num"  onclick="pressDigit(1)">1</button>
      <button class="tkey tk-num"  onclick="pressDigit(2)">2</button>
      <button class="tkey tk-num"  onclick="pressDigit(3)">3</button>

      <button class="tkey tk-func" onclick="pressDouble0()">00</button>
      <button class="tkey tk-num"  onclick="pressDigit(0)">0</button>
      <button class="tkey tk-back" onclick="pressBack()">⌫</button>
    </div>
  </div>

</div>

<!-- ─── 알람 ─── -->
<div class="section hidden" id="alarmSection">

  <div class="alarm-clock-wrap">
    <div class="clock-display" id="clockDisplay">00:00:00</div>
    <div class="clock-date"    id="clockDate"></div>
  </div>

  <div class="alarm-add-form">
    <input type="time" class="alarm-time-input" id="newAlarmTime" value="08:00">
    <input type="text" class="alarm-label-input" id="newAlarmLabel" placeholder="알람 이름 (선택)"
           onkeydown="if(event.key==='Enter') addAlarm()">
    <button class="reset-btn" onclick="resetAlarmForm()" title="리셋">C</button>
    <button class="add-btn" onclick="addAlarm()" title="추가">+</button>
  </div>

  <div class="alarm-list" id="alarmList"></div>

</div>

<script>
const p2 = n => String(n).padStart(2, '0');

// ════════════════════════════════
//  탭 전환
// ════════════════════════════════
let activeTab = 'timer';

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.tab === tab));
  document.getElementById('timerSection').classList.toggle('hidden', tab !== 'timer');
  document.getElementById('alarmSection').classList.toggle('hidden', tab !== 'alarm');
}

// ════════════════════════════════
//  오디오
// ════════════════════════════════
function playBeep(freq = 880, dur = 0.5, vol = 0.45) {
  try {
    const ctx  = new (window.AudioContext || window.webkitAudioContext)();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine'; osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(); osc.stop(ctx.currentTime + dur);
    setTimeout(() => ctx.close(), (dur + 0.2) * 1000);
  } catch(e) {}
}

function beepN(n, freq, dur, gap) {
  for (let i = 0; i < n; i++) setTimeout(() => playBeep(freq, dur), i * gap);
}

// ════════════════════════════════
//  타이머 — 세그먼트 방식
// ════════════════════════════════
let hBuf = [0, 0]; // [tens, units]
let mBuf = [0, 0];
let sBuf = [0, 0];
let activeSeg   = 'h';
let timerState  = 'stopped'; // stopped | running | paused | done
let timerRemain = 0;
let timerInterval = null;

// ── 세그먼트 선택 ──
function selectSeg(seg) {
  if (timerState === 'running') return;
  activeSeg = seg;
  updateSegHighlight();
}

function updateSegHighlight() {
  ['h', 'm', 's'].forEach(s => {
    const el = document.getElementById('seg' + s.toUpperCase());
    el.classList.toggle('active', s === activeSeg);
    // 완료 상태가 아닐 때만
    if (timerState !== 'done') el.classList.remove('done-flash');
  });
}

function moveSeg(delta) {
  const order = ['h', 'm', 's'];
  const idx = order.indexOf(activeSeg);
  activeSeg = order[(idx + delta + 3) % 3];
  updateSegHighlight();
}

// ── 숫자 입력 (shift-left per segment) ──
function getBuf() { return activeSeg === 'h' ? hBuf : activeSeg === 'm' ? mBuf : sBuf; }

function pressDigit(d) {
  if (timerState === 'running' || timerState === 'done') return;
  const buf = getBuf();
  buf.push(d); buf.shift();
  // M, S clamp to 59
  if ((activeSeg === 'm' || activeSeg === 's') && buf[0] * 10 + buf[1] > 59) {
    buf[0] = 5; buf[1] = 9;
  }
  syncSegs();
  updateStartBtn();
}

function pressDouble0() { pressDigit(0); pressDigit(0); }

function pressBack() {
  if (timerState === 'running' || timerState === 'done') return;
  const buf = getBuf();
  buf.unshift(0); buf.pop();
  syncSegs();
  updateStartBtn();
}

// ── 프리셋 (누적 추가) ──
function setPreset(h, m, s) {
  if (timerState === 'running' || timerState === 'done') return;
  // 현재 설정 시간에 더함
  let total = getSetSeconds() + h * 3600 + m * 60 + s;
  // 최대 99:59:59 제한
  total = Math.min(total, 99 * 3600 + 59 * 60 + 59);
  const th = Math.floor(total / 3600);
  const tm = Math.floor((total % 3600) / 60);
  const ts = total % 60;
  hBuf = [Math.floor(th / 10), th % 10];
  mBuf = [Math.floor(tm / 10), tm % 10];
  sBuf = [Math.floor(ts / 10), ts % 10];
  syncSegs();
  updateStartBtn();
}

// ── 값 동기화 ──
function syncSegs() {
  document.getElementById('segH').textContent = p2(hBuf[0] * 10 + hBuf[1]);
  document.getElementById('segM').textContent = p2(mBuf[0] * 10 + mBuf[1]);
  document.getElementById('segS').textContent = p2(sBuf[0] * 10 + sBuf[1]);
}

function setSegsFromSeconds(secs) {
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = secs % 60;
  document.getElementById('segH').textContent = p2(h);
  document.getElementById('segM').textContent = p2(m);
  document.getElementById('segS').textContent = p2(s);
}

function getSetSeconds() {
  return (hBuf[0] * 10 + hBuf[1]) * 3600
       + (mBuf[0] * 10 + mBuf[1]) * 60
       + (sBuf[0] * 10 + sBuf[1]);
}

// ── 인크리먼트 (↑↓) ──
function incrSeg(delta) {
  if (timerState === 'running' || timerState === 'done') return;
  const buf = getBuf();
  let val = buf[0] * 10 + buf[1] + delta;
  if (activeSeg === 'h') {
    val = Math.max(0, Math.min(99, val));
  } else {
    val = ((val % 60) + 60) % 60;
  }
  buf[0] = Math.floor(val / 10);
  buf[1] = val % 10;
  syncSegs();
  updateStartBtn();
}

// ── 타이머 제어 ──
function toggleTimer() {
  if (timerState === 'stopped') {
    const secs = getSetSeconds();
    if (secs === 0) return;
    timerRemain = secs;
    timerState  = 'running';
    timerInterval = setInterval(timerTick, 1000);
  } else if (timerState === 'running') {
    clearInterval(timerInterval);
    timerState = 'paused';
  } else if (timerState === 'paused') {
    timerState = 'running';
    timerInterval = setInterval(timerTick, 1000);
  }
  updateTimerUI();
}

function resetTimer() {
  clearInterval(timerInterval);
  timerState = 'stopped';
  hBuf = [0,0]; mBuf = [0,0]; sBuf = [0,0];
  timerRemain = 0;
  ['segH','segM','segS'].forEach(id => {
    document.getElementById(id).classList.remove('done-flash');
  });
  syncSegs();
  selectSeg('h');
  updateTimerUI();
}

function timerTick() {
  timerRemain--;
  if (timerRemain <= 0) {
    clearInterval(timerInterval);
    timerState = 'done';
    timerDone();
  } else {
    setSegsFromSeconds(timerRemain);
  }
}

function timerDone() {
  ['segH','segM','segS'].forEach(id => {
    const el = document.getElementById(id);
    el.classList.remove('active');
    el.classList.add('done-flash');
  });
  document.getElementById('segH').textContent = '완';
  document.getElementById('segM').textContent = '  료';
  document.getElementById('segS').textContent = '  !';
  beepN(4, 880, 0.5, 700);
  updateTimerUI();
  setTimeout(() => {
    ['segH','segM','segS'].forEach(id =>
      document.getElementById(id).classList.remove('done-flash'));
  }, 5000);
}

function updateTimerUI() {
  const startBtn   = document.getElementById('startBtn');
  const numpadWrap = document.getElementById('numpadWrap');
  const isEditable = timerState === 'stopped' || timerState === 'paused';

  switch(timerState) {
    case 'stopped':
      startBtn.textContent = '▶ 시작';
      startBtn.disabled    = getSetSeconds() === 0;
      break;
    case 'running':
      startBtn.textContent = '⏸ 일시정지';
      startBtn.disabled    = false;
      break;
    case 'paused':
      startBtn.textContent = '▶ 재개';
      startBtn.disabled    = false;
      break;
    case 'done':
      startBtn.textContent = '▶ 시작';
      startBtn.disabled    = true;
      break;
  }

  numpadWrap.style.opacity       = isEditable ? '1' : '0.2';
  numpadWrap.style.pointerEvents = isEditable ? 'auto' : 'none';
}

function updateStartBtn() {
  document.getElementById('startBtn').disabled = getSetSeconds() === 0;
}

// ── 키보드 ──
document.addEventListener('keydown', e => {
  if (activeTab !== 'timer') return;
  if (document.activeElement.tagName === 'INPUT') return;

  if (e.key >= '0' && e.key <= '9') {
    e.preventDefault(); pressDigit(+e.key);
  } else if (e.key === 'Backspace') {
    e.preventDefault(); pressBack();
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault(); moveSeg(-1);
  } else if (e.key === 'ArrowRight') {
    e.preventDefault(); moveSeg(1);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault(); incrSeg(1);
  } else if (e.key === 'ArrowDown') {
    e.preventDefault(); incrSeg(-1);
  } else if (e.key === 'Tab') {
    e.preventDefault(); moveSeg(e.shiftKey ? -1 : 1);
  } else if (e.key === 'Enter' || e.key === ' ') {
    e.preventDefault(); toggleTimer();
  } else if (e.key === 'Escape') {
    e.preventDefault(); resetTimer();
  }
});

// ════════════════════════════════
//  알람
// ════════════════════════════════
let alarms    = [];
let firingIds = new Set(); // 현재 울리는 중인 알람 id
let firedIds  = new Set(); // 30초 울림 완료된 알람 id (회색 표시)

function loadAlarms() {
  try { alarms = JSON.parse(localStorage.getItem('dt_alarms') || '[]'); } catch(e) { alarms = []; }
  renderAlarms();
}

function saveAlarms() {
  localStorage.setItem('dt_alarms', JSON.stringify(alarms));
}

function addAlarm() {
  const time  = document.getElementById('newAlarmTime').value;
  const label = document.getElementById('newAlarmLabel').value.trim();
  if (!time) return;
  alarms.push({ id: Date.now(), time, label, enabled: true });
  alarms.sort((a, b) => a.time.localeCompare(b.time));
  saveAlarms();
  renderAlarms();
  document.getElementById('newAlarmLabel').value = '';
}

function deleteAlarm(id) {
  id = Number(id);
  alarms = alarms.filter(a => a.id !== id);
  firingIds.delete(id);
  firedIds.delete(id);
  saveAlarms();
  renderAlarms();
}

function resetAlarmForm() {
  if (firingIds.size > 0 || firedIds.size > 0) {
    // 울리는/울린 알람 상태 초기화 → 회색 해제
    firingIds.clear();
    firedIds.clear();
    renderAlarms();
  } else {
    // 입력 폼 초기화
    document.getElementById('newAlarmTime').value  = '08:00';
    document.getElementById('newAlarmLabel').value = '';
  }
}

function isAlarmPast(time) {
  const now = new Date();
  const [ah, am] = time.split(':').map(Number);
  const nh = now.getHours(), nm = now.getMinutes();
  return ah < nh || (ah === nh && am < nm);
}

function toggleAlarmEnabled(id) {
  id = Number(id);
  const al = alarms.find(a => a.id === id);
  if (al) { al.enabled = !al.enabled; saveAlarms(); renderAlarms(); }
}

// ── 핵심: innerHTML로만 렌더링 (stale DOM 참조 없음) ──
function renderAlarms() {
  const list = document.getElementById('alarmList');

  if (alarms.length === 0) {
    list.innerHTML = `
      <div class="alarm-empty">
        <div class="alarm-empty-icon">🔔</div>
        <p>알람을 추가해 보세요</p>
      </div>`;
    return;
  }

  list.innerHTML = alarms.map(al => {
    const isFiring = firingIds.has(al.id);
    const isPast   = !isFiring && (firedIds.has(al.id) || (al.enabled && isAlarmPast(al.time)));
    const cls = [
      al.enabled ? 'on' : '',
      isFiring   ? 'firing' : '',
      isPast     ? 'past'   : ''
    ].filter(Boolean).join(' ');
    return `
    <div class="alarm-item ${cls}">
      <div class="alarm-time">${al.time}</div>
      <div class="alarm-info">
        <div class="alarm-lbl">${al.label || '알람'}</div>
      </div>
      <label class="toggle">
        <input type="checkbox" ${al.enabled ? 'checked' : ''}
               onchange="toggleAlarmEnabled(${al.id})">
        <span class="toggle-slider"></span>
      </label>
      <button class="alarm-del-btn" onclick="deleteAlarm(${al.id})"
              title="삭제">×</button>
    </div>`;
  }).join('');
}

// ── 시계 + 알람 체크 ──
const DOW_KO = ['일','월','화','수','목','금','토'];

function clockTick() {
  const now = new Date();
  const hh  = p2(now.getHours()), mm = p2(now.getMinutes()), ss = p2(now.getSeconds());
  document.getElementById('clockDisplay').textContent = `${hh}:${mm}:${ss}`;

  const dow = DOW_KO[now.getDay()];
  document.getElementById('clockDate').textContent =
    `${now.getFullYear()}.${p2(now.getMonth()+1)}.${p2(now.getDate())} (${dow})`;

  // 정각 초에 알람 체크
  if (now.getSeconds() === 0) {
    const nowTime = `${hh}:${mm}`;
    alarms.forEach(al => {
      if (al.enabled && al.time === nowTime && !firingIds.has(al.id)) {
        fireAlarm(al.id);
      }
    });
  }
}

function fireAlarm(id) {
  firingIds.add(id);
  renderAlarms();
  beepN(6, 880, 0.6, 800);
  setTimeout(() => {
    firingIds.delete(id);
    firedIds.add(id);   // 울림 완료 → 회색으로 표시
    renderAlarms();
  }, 30000);
}

// ── 초기화 ──
loadAlarms();
setInterval(clockTick, 1000);
clockTick();
</script>
