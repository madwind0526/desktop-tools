<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://open.er-api.com;">
<title>Desktop Tools</title>
<link rel="stylesheet" href="css/common.css">
<script>
  /* Electron 환경이 아니면 타이틀바 숨김 */
  if (typeof window.electronAPI === 'undefined') {
    document.documentElement.classList.add('web-mode');
  }
</script>
<style>
  .web-mode .titlebar { display: none !important; }
</style>
</head>
<body>

<!-- 타이틀바 -->
<div class="titlebar">
  <span class="titlebar-title">Desktop Tools</span>
  <div class="titlebar-controls">
    <button class="titlebar-btn" onclick="window.electronAPI?.minimize()">&#8722;</button>
    <button class="titlebar-btn" onclick="window.electronAPI?.maximize()">&#9633;</button>
    <button class="titlebar-btn close" onclick="window.electronAPI?.close()">&#10005;</button>
  </div>
</div>

<div class="app-layout">

  <!-- 사이드바 (아이콘만, 텍스트 없음) -->
  <nav class="sidebar">

    <!-- 계산기 -->
    <div class="nav-item" data-tool="calculator" onclick="showTool('calculator')" title="계산기">
      <span class="nav-icon">
        <svg viewBox="0 0 20 20" stroke-width="1.5" stroke-linecap="round">
          <rect x="3" y="2" width="14" height="16" rx="2"/>
          <rect x="5.5" y="4.5" width="9" height="2.5" rx="0.8" stroke="none" fill="currentColor" opacity=".5"/>
          <circle cx="6.5"  cy="10.5" r="1" fill="currentColor" stroke="none"/>
          <circle cx="10"   cy="10.5" r="1" fill="currentColor" stroke="none"/>
          <circle cx="13.5" cy="10.5" r="1" fill="currentColor" stroke="none"/>
          <circle cx="6.5"  cy="14"   r="1" fill="currentColor" stroke="none"/>
          <circle cx="10"   cy="14"   r="1" fill="currentColor" stroke="none"/>
          <circle cx="13.5" cy="14"   r="1" fill="currentColor" stroke="none"/>
        </svg>
      </span>
    </div>

    <!-- 환율 변환기 -->
    <div class="nav-item" data-tool="currency" onclick="showTool('currency')" title="환율 변환기">
      <span class="nav-icon">
        <svg viewBox="0 0 20 20" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 7h11M14 7l-3-2.5M14 7l-3 2.5"/>
          <path d="M17 13H6M6 13l3-2.5M6 13l3 2.5"/>
        </svg>
      </span>
    </div>

    <!-- 도량형 변환기 -->
    <div class="nav-item" data-tool="unit" onclick="showTool('unit')" title="도량형 변환기">
      <span class="nav-icon">
        <svg viewBox="0 0 20 20" stroke-width="1.5" stroke-linecap="round">
          <rect x="2" y="8.5" width="16" height="4" rx="1"/>
          <line x1="5"  y1="8.5" x2="5"  y2="11"/>
          <line x1="8"  y1="8.5" x2="8"  y2="12.5"/>
          <line x1="11" y1="8.5" x2="11" y2="11"/>
          <line x1="14" y1="8.5" x2="14" y2="12.5"/>
        </svg>
      </span>
    </div>

    <div class="sidebar-divider"></div>

    <!-- D-day 계산기 -->
    <div class="nav-item" data-tool="dday" onclick="showTool('dday')" title="D-day 계산기">
      <span class="nav-icon">
        <svg viewBox="0 0 20 20" stroke-width="1.5" stroke-linecap="round">
          <rect x="3" y="4" width="14" height="13" rx="1.5"/>
          <line x1="3" y1="8" x2="17" y2="8"/>
          <line x1="7" y1="2" x2="7" y2="5.5"/>
          <line x1="13" y1="2" x2="13" y2="5.5"/>
          <text x="10" y="15" text-anchor="middle" fill="currentColor" font-size="5.5"
                font-weight="700" stroke="none" font-family="monospace">D</text>
        </svg>
      </span>
    </div>

    <!-- 음력/양력 -->
    <div class="nav-item" data-tool="lunar" onclick="showTool('lunar')" title="음력 / 양력 변환기">
      <span class="nav-icon">
        <svg viewBox="0 0 20 20" stroke-width="1.5" stroke-linecap="round">
          <path d="M13.5 4A7 7 0 1 0 13.5 16 5 5 0 0 1 13.5 4z"/>
        </svg>
      </span>
    </div>

    <!-- 알람/타이머 -->
    <div class="nav-item" data-tool="alarm" onclick="showTool('alarm')" title="알람 / 타이머">
      <span class="nav-icon">
        <svg viewBox="0 0 20 20" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="10" cy="11.5" r="6"/>
          <path d="M10 8.5v3l2 1.5"/>
          <path d="M4.5 5L3 6.5M15.5 5L17 6.5"/>
        </svg>
      </span>
    </div>

    <!-- 스페이서 -->
    <div class="sidebar-spacer"></div>

    <!-- 다크/라이트 모드 토글 -->
    <div class="theme-toggle-item" id="themeToggle" onclick="toggleTheme()" title="라이트 모드">
      <span class="nav-icon" id="themeIcon">
        <svg viewBox="0 0 20 20" stroke-width="1.4" stroke-linecap="round" stroke="currentColor" fill="none">
          <circle cx="10" cy="10" r="3.5"/>
          <line x1="10" y1="2.5" x2="10" y2="1"/>
          <line x1="10" y1="17.5" x2="10" y2="19"/>
          <line x1="2.5" y1="10" x2="1" y2="10"/>
          <line x1="17.5" y1="10" x2="19" y2="10"/>
          <line x1="4.9"  y1="4.9"  x2="3.8"  y2="3.8"/>
          <line x1="15.1" y1="15.1" x2="16.2" y2="16.2"/>
          <line x1="15.1" y1="4.9"  x2="16.2" y2="3.8"/>
          <line x1="4.9"  y1="15.1" x2="3.8"  y2="16.2"/>
        </svg>
      </span>
    </div>

  </nav>

  <!-- 콘텐츠 영역 -->
  <main class="content">

    <div class="tool-panel active" id="panel-welcome">
      <div class="welcome">
        <div class="welcome-icon">🔧</div>
        <h2>Desktop Tools</h2>
        <p>왼쪽 아이콘을 클릭해서 도구를 선택하세요.</p>
      </div>
    </div>

    <div class="tool-panel" id="panel-calculator">
      <iframe src="tools/calculator/index.html" style="width:100%;height:100%;border:none;"></iframe>
    </div>
    <div class="tool-panel" id="panel-currency">
      <iframe src="tools/currency/index.html" style="width:100%;height:100%;border:none;"></iframe>
    </div>
    <div class="tool-panel" id="panel-unit">
      <iframe src="tools/unit/index.html" style="width:100%;height:100%;border:none;"></iframe>
    </div>
    <div class="tool-panel" id="panel-dday">
      <iframe src="tools/dday/index.html" style="width:100%;height:100%;border:none;"></iframe>
    </div>
    <div class="tool-panel" id="panel-lunar">
      <iframe src="tools/lunar/index.html" style="width:100%;height:100%;border:none;"></iframe>
    </div>
    <div class="tool-panel" id="panel-alarm">
      <iframe src="tools/alarm/index.html" style="width:100%;height:100%;border:none;"></iframe>
    </div>

  </main>
</div>

<script>
/* ── 도구 전환 ── */
function showTool(name) {
  document.querySelectorAll('.tool-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(`panel-${name}`).classList.add('active');
  document.querySelector(`[data-tool="${name}"]`).classList.add('active');
}

/* ══════════════════════════════════════
   라이트 모드 주입 CSS
   (iframe 내부에 <style>로 삽입됨)
══════════════════════════════════════ */
const LIGHT_CSS = `
/* ── Base ── */
html[data-theme="light"] body {
  background: #f5f7fa !important; color: #1a1a2e !important;
}

/* ── 공통 배경 (헤더/탭바/패널) ── */
html[data-theme="light"] .header,
html[data-theme="light"] .today-bar,
html[data-theme="light"] .mode-tabs,
html[data-theme="light"] .input-area,
html[data-theme="light"] .tab-bar,
html[data-theme="light"] .toolbar,
html[data-theme="light"] .display,
html[data-theme="light"] .sci-panel,
html[data-theme="light"] .rate-bar,
html[data-theme="light"] .keypad,
html[data-theme="light"] .section,
html[data-theme="light"] .timer-top,
html[data-theme="light"] .presets,
html[data-theme="light"] .timer-controls,
html[data-theme="light"] .timer-keypad,
html[data-theme="light"] .alarm-clock-wrap,
html[data-theme="light"] .alarm-add-form,
html[data-theme="light"] .alarm-list,
html[data-theme="light"] .result-area,
html[data-theme="light"] .hist-panel,
html[data-theme="light"] .converter {
  background: #f5f7fa !important;
}

/* ── 공통 구분선 색상 ── */
html[data-theme="light"] .header,
html[data-theme="light"] .today-bar,
html[data-theme="light"] .mode-tabs,
html[data-theme="light"] .input-area,
html[data-theme="light"] .tab-bar,
html[data-theme="light"] .hist-panel,
html[data-theme="light"] .rate-bar,
html[data-theme="light"] .alarm-clock-wrap,
html[data-theme="light"] .alarm-add-form,
html[data-theme="light"] .unit-row,
html[data-theme="light"] .cur-row,
html[data-theme="light"] .alarm-item {
  border-color: #dde1ee !important;
}

/* ── 카드 ── */
html[data-theme="light"] .result-card {
  background: #ffffff !important; border-color: #dde1ee !important;
}

/* ── 기본 텍스트 (흰색 → 다크) ── */
html[data-theme="light"] .header-title,
html[data-theme="light"] .result-line,
html[data-theme="light"] .today-line,
html[data-theme="light"] .clock-display,
html[data-theme="light"] .seg,
html[data-theme="light"] .hist-result,
html[data-theme="light"] .value {
  color: #1a1a2e !important;
}
html[data-theme="light"] .alarm-item.on .alarm-time { color: #1a1a2e !important; }
html[data-theme="light"] .unit-row.focused .value,
html[data-theme="light"] .cur-row.focused .value     { color: #1a1a2e !important; }
html[data-theme="light"] .unit-row:not(.focused) .value,
html[data-theme="light"] .cur-row:not(.focused) .value { color: #aaa !important; }

/* ── 악센트 색 유지 ── */
html[data-theme="light"] .result-line.accent { color: #a78bfa !important; }
html[data-theme="light"] .today-line.lunar   { color: #a78bfa !important; }

/* ── 보조 텍스트 ── */
html[data-theme="light"] .expr-line,
html[data-theme="light"] .hist-expr,
html[data-theme="light"] .field-label,
html[data-theme="light"] .seg-lbl,
html[data-theme="light"] .clock-date,
html[data-theme="light"] .alarm-lbl,
html[data-theme="light"] .today-line.ganjok,
html[data-theme="light"] .unit-name,
html[data-theme="light"] .unit-arrow,
html[data-theme="light"] .rate-text,
html[data-theme="light"] .update-time,
html[data-theme="light"] .field-note {
  color: #888 !important;
}

/* ── 흐린 텍스트 ── */
html[data-theme="light"] .alarm-del-btn  { color: #ccc !important; }
html[data-theme="light"] .tsep           { color: #ccc !important; }
html[data-theme="light"] .inp-sep        { color: #c0c4d8 !important; }
html[data-theme="light"] .result-line.dim{ color: #999 !important; }
html[data-theme="light"] .result-empty,
html[data-theme="light"] .alarm-empty    { color: #ccc !important; }
html[data-theme="light"] .alarm-time     { color: #bbb !important; }
html[data-theme="light"] .hist-empty     { color: #ccc !important; }

/* ── 탭 버튼 ── */
html[data-theme="light"] .tab-btn        { color: #888 !important; border-color: transparent !important; }
html[data-theme="light"] .tab-btn.active { color: #1a1a2e !important; border-bottom-color: #7c6af7 !important; }

/* ── 모드 탭 ── */
html[data-theme="light"] .mode-tab        { background: #e4e6f0 !important; color: #666 !important; }
html[data-theme="light"] .mode-tab.active { background: #7c6af7 !important; color: #fff !important; }

/* ── 카테고리 탭 (unit) ── */
html[data-theme="light"] .cat-tab        { color: #888 !important; }
html[data-theme="light"] .cat-tab.active { background: #e4e6f0 !important; color: #1a1a2e !important; }

/* ── 입력창 / 셀렉트 ── */
html[data-theme="light"] input[type="number"],
html[data-theme="light"] input[type="text"],
html[data-theme="light"] input[type="time"],
html[data-theme="light"] select,
html[data-theme="light"] .alarm-time-input,
html[data-theme="light"] .alarm-label-input,
html[data-theme="light"] .cur-select {
  background: #ffffff !important;
  border-color: #d0d4e4 !important;
  color: #1a1a2e !important;
  color-scheme: light !important;
}
html[data-theme="light"] input::placeholder,
html[data-theme="light"] .alarm-label-input::placeholder { color: #c0c4d8 !important; }
html[data-theme="light"] select option,
html[data-theme="light"] .cur-select option { background: #fff !important; color: #1a1a2e !important; }

/* ── 아이콘 버튼 ── */
html[data-theme="light"] .tool-btn,
html[data-theme="light"] .refresh-btn    { color: #888 !important; }
html[data-theme="light"] .tool-btn:hover,
html[data-theme="light"] .refresh-btn:hover { background: #e4e6f0 !important; color: #444 !important; }

/* ── 계산기 키 ── */
html[data-theme="light"] .k-num  { background: #eaedf5 !important; color: #1a1a2e !important; }
html[data-theme="light"] .k-dot  { background: #eaedf5 !important; color: #1a1a2e !important; }
html[data-theme="light"] .k-op   { background: #dff5e9 !important; color: #16a34a !important; }
html[data-theme="light"] .k-eq   { background: #1db954 !important; color: #fff    !important; }
html[data-theme="light"] .k-clear{ background: #ffe4e4 !important; color: #e04f4f !important; }
html[data-theme="light"] .k-back { background: #e4e6f0 !important; color: #555    !important; }
html[data-theme="light"] .k-paren{ background: #e4e6f0 !important; color: #888    !important; }
html[data-theme="light"] .k-pct  { background: #e4e6f0 !important; color: #888    !important; }
html[data-theme="light"] .k-nav  { background: #dff5e9 !important; color: #16a34a !important; }
html[data-theme="light"] .k-sign { background: #e4e6f0 !important; color: #888    !important; }
html[data-theme="light"] .sci-btn { background: #e4e6f0 !important; color: #555   !important; }
html[data-theme="light"] .sci-btn.hi     { color: #16a34a !important; }
html[data-theme="light"] .sci-btn.rad-on { color: #d97706 !important; }

/* ── 히스토리 ── */
html[data-theme="light"] .hist-item       { background: transparent !important; }
html[data-theme="light"] .hist-item:hover { background: #eaedf5 !important; }

/* ── 타이머 키 ── */
html[data-theme="light"] .tkey.tk-num  { background: #eaedf5 !important; color: #1a1a2e !important; }
html[data-theme="light"] .tkey.tk-func,
html[data-theme="light"] .tkey.tk-back { background: #e4e6f0 !important; color: #555    !important; }
html[data-theme="light"] .preset-btn   { background: #e4e6f0 !important; color: #555    !important; }
html[data-theme="light"] .ctrl-btn.ctrl-reset { background: #e4e6f0 !important; color: #444 !important; }
html[data-theme="light"] .reset-btn    { background: #e4e6f0 !important; color: #666    !important; }

/* ── 세그먼트 ── */
html[data-theme="light"] .seg              { background: transparent !important; color: #1a1a2e !important; }
html[data-theme="light"] .seg.active       { background: rgba(124,106,247,0.15) !important; color: #7c6af7 !important; }
html[data-theme="light"] .seg:hover:not(.active) { background: #e4e6f0 !important; }

/* ── 환율 스왑 버튼 ── */
html[data-theme="light"] .swap-btn       { background: #e4e6f0 !important; color: #7c6af7 !important; }
html[data-theme="light"] .swap-btn:hover { background: #d8dce8 !important; }

/* ── 환율 오버레이 ── */
html[data-theme="light"] .overlay       { color: #888 !important; }
html[data-theme="light"] .retry-btn     { background: #e4e6f0 !important; border-color: #d0d4e4 !important; color: #444 !important; }

/* ── 토글 스위치 ── */
html[data-theme="light"] .toggle-slider { background: #ccc !important; }

/* ── 알람 지난/발화 ── */
html[data-theme="light"] .alarm-item.past .alarm-time { color: #c8ccdc !important; }
html[data-theme="light"] .alarm-item.past .alarm-lbl  { color: #d4d8e8 !important; }
html[data-theme="light"] .alarm-del-btn:hover         { color: #f87171 !important; }

/* ── 스크롤바 ── */
html[data-theme="light"] ::-webkit-scrollbar-thumb { background: #ccc !important; }
`;

/* ── 테마 적용 ── */
function applyTheme(theme) {
  localStorage.setItem('dt_theme', theme);
  document.documentElement.setAttribute('data-theme', theme);
  updateThemeIcon(theme);
  document.querySelectorAll('iframe').forEach(f => injectTheme(f, theme));
}

function injectTheme(frame, theme) {
  try {
    const doc = frame.contentDocument;
    if (!doc || !doc.head) return;
    doc.documentElement.setAttribute('data-theme', theme);
    let s = doc.getElementById('__theme__');
    if (!s) { s = doc.createElement('style'); s.id = '__theme__'; doc.head.appendChild(s); }
    s.textContent = theme === 'light' ? LIGHT_CSS : '';
  } catch(e) {}
}

function toggleTheme() {
  const cur = localStorage.getItem('dt_theme') || 'dark';
  applyTheme(cur === 'dark' ? 'light' : 'dark');
}

function updateThemeIcon(theme) {
  const el = document.getElementById('themeIcon');
  const toggle = document.getElementById('themeToggle');
  if (theme === 'light') {
    el.innerHTML = `<svg viewBox="0 0 20 20" stroke-width="1.4" stroke-linecap="round" stroke="currentColor" fill="none">
      <path d="M14 4A7 7 0 1 0 14 16 5 5 0 0 1 14 4z"/>
    </svg>`;
    toggle.title = '다크 모드로 전환';
  } else {
    el.innerHTML = `<svg viewBox="0 0 20 20" stroke-width="1.4" stroke-linecap="round" stroke="currentColor" fill="none">
      <circle cx="10" cy="10" r="3.5"/>
      <line x1="10" y1="2.5" x2="10" y2="1"/>
      <line x1="10" y1="17.5" x2="10" y2="19"/>
      <line x1="2.5" y1="10" x2="1" y2="10"/>
      <line x1="17.5" y1="10" x2="19" y2="10"/>
      <line x1="4.9"  y1="4.9"  x2="3.8"  y2="3.8"/>
      <line x1="15.1" y1="15.1" x2="16.2" y2="16.2"/>
      <line x1="15.1" y1="4.9"  x2="16.2" y2="3.8"/>
      <line x1="4.9"  y1="15.1" x2="3.8"  y2="16.2"/>
    </svg>`;
    toggle.title = '라이트 모드로 전환';
  }
}

/* iframe 로드 시 테마 재적용 */
document.querySelectorAll('iframe').forEach(f => {
  f.addEventListener('load', () => {
    const theme = localStorage.getItem('dt_theme') || 'dark';
    injectTheme(f, theme);
  });
});

/* 초기화 */
const _savedTheme = localStorage.getItem('dt_theme') || 'dark';
applyTheme(_savedTheme);
</script>
</body>
</html>
